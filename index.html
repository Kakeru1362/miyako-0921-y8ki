<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>宮古島たび日程</title>
  <meta name="theme-color" content="#0fa3b8">
  <meta name="description" content="宮古島旅行 2026.9.21–9.25 のスケジュール">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">

    <header class="hero">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>

      <svg class="turtle-hero" viewBox="0 0 160 110" aria-hidden="true">
        <defs>
          <linearGradient id="shellGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#48a97f"/>
            <stop offset="1" stop-color="#2e8b6e"/>
          </linearGradient>
        </defs>
        <!-- 前ヒレ（上に上げて泳ぐ） -->
        <path d="M52 42 Q 40 10 22 19 Q 30 40 54 50 Z" fill="#9fdcb0"/>
        <!-- 後ヒレ -->
        <path d="M96 84 Q 88 104 104 102 Q 116 99 114 84 Z" fill="#9fdcb0"/>
        <!-- しっぽ -->
        <path d="M124 64 q 12 3 8 13 q -10 1 -15 -7 Z" fill="#9fdcb0"/>
        <!-- 甲羅 -->
        <ellipse cx="84" cy="62" rx="43" ry="29" fill="url(#shellGrad)"/>
        <ellipse cx="84" cy="58" rx="33" ry="21" fill="#57bd8f" opacity="0.75"/>
        <circle cx="72" cy="55" r="7" fill="#256e57" opacity="0.5"/>
        <circle cx="93" cy="50" r="6" fill="#256e57" opacity="0.5"/>
        <circle cx="97" cy="66" r="7" fill="#256e57" opacity="0.5"/>
        <circle cx="76" cy="70" r="5" fill="#256e57" opacity="0.5"/>
        <!-- 顔 -->
        <circle cx="34" cy="54" r="15" fill="#9fdcb0"/>
        <circle cx="29" cy="50" r="2.7" fill="#1d4e5f"/>
        <circle cx="28.2" cy="49.2" r="0.9" fill="#ffffff"/>
        <path d="M24 59 q 5 4 11 1" stroke="#1d4e5f" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <circle cx="23" cy="56" r="2.4" fill="#f4a2a2" opacity="0.55"/>
      </svg>

      <p class="hero-eyebrow">OKINAWA / MIYAKOJIMA</p>
      <h1>宮古島たび日程</h1>
      <p class="hero-dates">
        <span>2026.9.21 MON – 9.25 FRI</span>
        <span class="trip-status" id="tripStatus"></span>
      </p>

      <svg class="wave" viewBox="0 0 480 22" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 22 L0 12 Q 30 2 60 12 T 120 12 T 180 12 T 240 12 T 300 12 T 360 12 T 420 12 T 480 12 L480 22 Z" fill="#fdf9f2"/>
      </svg>
    </header>

    <div class="sticky-head">
      <nav class="day-tabs" id="dayTabs" aria-label="日にちを選ぶ"></nav>
      <div class="filter-chips" id="filterChips" aria-label="予定を絞り込む"></div>
    </div>

    <main class="timeline" id="timeline"></main>
  </div>

  <span class="sync-status" id="syncStatus"></span>
  <button class="fab" id="addBtn" aria-label="予定を追加">＋</button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <div class="sheet" id="eventSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <form id="eventForm" novalidate>
      <div class="sheet-top">
        <h2 id="sheetTitle">予定を追加</h2>
        <button type="button" class="sheet-close" id="fClose">とじる</button>
      </div>

      <p class="form-error" id="fError" hidden></p>

      <label class="field">
        <span class="field-label">予定名<span class="req">必須</span></span>
        <input type="text" id="fTitle" maxlength="50" placeholder="例：与那覇前浜ビーチでシュノーケル" autocomplete="off">
      </label>

      <div class="field">
        <span class="field-label">分類<span class="req">必須</span></span>
        <div class="cat-chips" id="fCategories"></div>
      </div>

      <label class="field">
        <span class="field-label">日にち</span>
        <select id="fDate"></select>
      </label>

      <div class="field field-row">
        <label>
          <span class="field-label">開始</span>
          <input type="time" id="fStart">
        </label>
        <label>
          <span class="field-label">終了</span>
          <input type="time" id="fEnd">
        </label>
      </div>

      <div class="field">
        <span class="field-label">予約</span>
        <div class="segment">
          <label>
            <input type="radio" name="reserved" id="fReservedNo" checked>
            <span>予約なし</span>
          </label>
          <label>
            <input type="radio" name="reserved" id="fReservedYes">
            <span>🎫 予約済み</span>
          </label>
        </div>
      </div>

      <label class="field">
        <span class="field-label">Google マップ</span>
        <input type="url" id="fMap" placeholder="https://maps.app.goo.gl/…" autocomplete="off" inputmode="url">
        <span class="field-hint">Googleマップでお店を開いて「共有」→「リンクをコピー」で貼り付け</span>
      </label>

      <label class="field">
        <span class="field-label">メモ</span>
        <textarea id="fMemo" rows="3" maxlength="500" placeholder="持ち物、予約時間の注意など"></textarea>
      </label>

      <button type="submit" class="btn-save" id="fSave">保存する</button>
      <button type="button" class="btn-delete" id="fDelete" hidden>この予定を削除する</button>
    </form>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
